name: Build & Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet restore
      - run: dotnet build --configuration Release --no-restore
      - uses: actions/upload-artifact@v4
        with:
          name: Jellyfin.Plugin.AudioDescription
          path: bin/Release/net8.0/Jellyfin.Plugin.AudioDescription.dll

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet restore
      - run: dotnet build --configuration Release --no-restore
      - name: Package and compute checksum
        run: |
          mkdir -p dist
          zip -j dist/Jellyfin.Plugin.AudioDescription-${{ github.ref_name }}.zip bin/Release/net8.0/Jellyfin.Plugin.AudioDescription.dll
          MD5=$(md5sum dist/Jellyfin.Plugin.AudioDescription-${{ github.ref_name }}.zip | awk '{print toupper($1)}')
          echo "MD5_CHECKSUM=$MD5" >> $GITHUB_ENV
          echo "::notice::MD5 checksum: $MD5"
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/Jellyfin.Plugin.AudioDescription-${{ github.ref_name }}.zip
          body: |
            MD5 checksum: ${{ env.MD5_CHECKSUM }}
